server:
  port: 8080

spring:
  application:
    name: actify-coordination-service
  datasource:
    url: jdbc:mariadb://localhost:3306/actify_db?createDatabaseIfNotExist=true
    username: root
    password: your_password
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update # MVP 테스트 단계에서 엔티티 자동 스키마 매핑
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # MSA 에이전트 환경 유레카 주소
    register-with-eureka: true
    fetch-registry: true
