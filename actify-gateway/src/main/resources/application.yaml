server:
  port: 8000

spring:
  application:
    name: actify-gateway

eureka:
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info